name: Build (single arch)

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture: x86, x64, ARM, or ARM64'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ inputs.arch }}" in
            x86)
              echo "mingw_arch=i686"                       >> "$GITHUB_OUTPUT"
              echo "debian_arch=i386"                      >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=i386-linux-gnu"       >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                       >> "$GITHUB_OUTPUT"
              echo "lxmonika_sys=lxmonika_x86.sys"         >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"                     >> "$GITHUB_OUTPUT"
              echo "debian_arch=amd64"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=x86_64-linux-gnu"     >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                       >> "$GITHUB_OUTPUT"
              echo "lxmonika_sys=lxmonika_x64.sys"         >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"                      >> "$GITHUB_OUTPUT"
              echo "debian_arch=armhf"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=arm-linux-gnueabihf"  >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                       >> "$GITHUB_OUTPUT"
              echo "lxmonika_sys=lxmonika_arm.sys"         >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64"                    >> "$GITHUB_OUTPUT"
              echo "debian_arch=arm64"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=aarch64-linux-gnu"    >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                       >> "$GITHUB_OUTPUT"
              echo "lxmonika_sys=lxmonika_arm64.sys"       >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v5
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ucrt-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          # Select the UCRT Ubuntu x86_64 tarball.  When multiple Ubuntu versions
          # are published for the same release, sort_by(.name) picks the oldest
          # Ubuntu version first (e.g. ubuntu-20.04 before ubuntu-22.04) for
          # maximum runner compatibility.
          URL=$(gh api "repos/mstorsjo/llvm-mingw/releases/tags/${TAG}" \
            --jq '[.assets[]
                   | select(.name | test("ucrt-ubuntu-.*-x86_64\\.tar\\.xz$"))]
                  | sort_by(.name) | .[0].browser_download_url')
          curl -fL "$URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── CMake build ─────────────────────────────────────────────────────────

      - name: Install Ninja
        run: sudo apt-get install -y ninja-build

      - name: Build with CMake for ${{ inputs.arch }}
        env:
          MINGW_ARCH: ${{ steps.vars.outputs.mingw_arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$PWD/cmake/toolchain.cmake" \
            -DMINGW_ARCH="${{ steps.vars.outputs.mingw_arch }}" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      # ── QEMU + Debian chroot + WINE ─────────────────────────────────────────

      - name: Install QEMU user-mode emulation and debootstrap
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap

      - name: Cache Debian bookworm chroot with WINE
        id: cache_chroot
        uses: actions/cache@v5
        with:
          path: chroot.tar.zst
          key: chroot-bookworm-${{ steps.vars.outputs.debian_arch }}-wine

      - name: Create Debian chroot and install WINE
        if: steps.cache_chroot.outputs.cache-hit != 'true'
        run: |
          DEBIAN_ARCH="${{ steps.vars.outputs.debian_arch }}"

          # Bootstrap a Debian bookworm root filesystem for the target arch.
          # qemu-debootstrap handles the QEMU-assisted second stage automatically
          # for foreign architectures; for native arches it behaves like plain
          # debootstrap.
          sudo qemu-debootstrap \
            --arch="$DEBIAN_ARCH" \
            bookworm rootfs \
            https://deb.debian.org/debian

          # After qemu-debootstrap, binfmt_misc is registered on the host for
          # every foreign architecture.  Chroot commands can be invoked directly
          # without specifying the QEMU interpreter explicitly — the kernel
          # dispatches foreign ELF binaries through binfmt_misc automatically.
          sudo chroot rootfs apt-get update -q

          # Detect the latest Wine version available in the distro's repository.
          WINE_VERSION=$(sudo chroot rootfs apt-cache policy wine \
            | grep Candidate | awk '{print $2}')
          echo "Latest available Wine version for ${DEBIAN_ARCH}: ${WINE_VERSION}"

          # Install Wine.
          sudo chroot rootfs apt-get install -y wine

          # Pack the chroot for caching (zstd for a good speed/size trade-off).
          sudo tar --zstd -cf chroot.tar.zst rootfs

      - name: Restore Debian chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd -xf chroot.tar.zst

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run test_host.exe on WINE (${{ inputs.arch }})
        run: |
          # Bind-mount /proc, /dev, and the workspace into the chroot so that
          # Wine's wineserver can access kernel interfaces and the binaries are
          # accessible at /mnt/work/... inside the chroot.
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          # Run the driver test host only.
          # The lxmonika .sys path is passed as a Windows-style path via Wine's
          # Z: drive, which maps the root filesystem.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all \
                WINEDLLPATH=/usr/lib/${{ steps.vars.outputs.debian_multiarch }}/wine \
                WINEARCH=${{ steps.vars.outputs.wine_arch }} \
            wine /mnt/work/build/test_host/test_host.exe \
            'Z:\mnt\work\build\${{ steps.vars.outputs.lxmonika_sys }}'

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ inputs.arch }}
          path: |
            build/hello.exe
            build/test_host/test_host.exe
            build/lxmonika_*.sys
            build/lxmonika_*.pdb
          if-no-files-found: ignore
