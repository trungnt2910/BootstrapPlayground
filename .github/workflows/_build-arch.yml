name: Build (single arch)

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture: x86, x64, ARM, or ARM64'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ inputs.arch }}" in
            x86)
              echo "mingw_arch=i686"                        >> "$GITHUB_OUTPUT"
              echo "alpine_arch=x86"                        >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x86"                          >> "$GITHUB_OUTPUT"
              echo "wine_cross=false"                       >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"                      >> "$GITHUB_OUTPUT"
              echo "alpine_arch=x86_64"                     >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x64"                          >> "$GITHUB_OUTPUT"
              echo "wine_cross=false"                       >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"                       >> "$GITHUB_OUTPUT"
              echo "alpine_arch=armv7"                      >> "$GITHUB_OUTPUT"
              echo "musl_target=arm-linux-musleabihf"       >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm32"                        >> "$GITHUB_OUTPUT"
              echo "wine_cross=true"                        >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64"                     >> "$GITHUB_OUTPUT"
              echo "alpine_arch=aarch64"                    >> "$GITHUB_OUTPUT"
              echo "musl_target=aarch64-linux-musl"         >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm64"                        >> "$GITHUB_OUTPUT"
              echo "wine_cross=true"                        >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v5
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ucrt-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          URL=$(gh api "repos/mstorsjo/llvm-mingw/releases/tags/${TAG}" \
            --jq '[.assets[]
                   | select(.name | test("ucrt-ubuntu-.*-x86_64\\.tar\\.xz$"))]
                  | sort_by(.name) | .[0].browser_download_url')
          curl -fL "$URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── Cross-compile hello.exe ─────────────────────────────────────────────

      - name: Cross-compile hello.exe for ${{ inputs.arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          "${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-clang++" \
            -static -o hello.exe hello.cpp

      # ── PowerShell ──────────────────────────────────────────────────────────

      - name: Download PowerShell for ${{ inputs.arch }}
        run: |
          PS_VERSION="7.4.0-preview.4"
          PS_ARCH="${{ steps.vars.outputs.pwsh_arch }}"
          curl -fL "https://github.com/PowerShell/PowerShell/releases/download/v${PS_VERSION}/PowerShell-${PS_VERSION}-win-${PS_ARCH}.zip" \
            -o powershell.zip
          mkdir -p powershell
          unzip -q powershell.zip -d powershell
          rm powershell.zip

      # ── QEMU user-mode emulation ────────────────────────────────────────────

      - name: Install QEMU user-mode emulation
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support
          echo "QEMU arm  : $(qemu-arm-static     --version | head -1)"
          echo "QEMU arm64: $(qemu-aarch64-static --version | head -1)"

      # ── Alpine chroot + Wine ─────────────────────────────────────────────────
      #
      # For x86/x64: use Alpine's pre-built wine package from the community
      # repository.  Alpine builds wine against musl libc so it runs in the
      # lightweight Alpine chroot without any Ubuntu-specific dependencies.
      #
      # For ARM/ARM64: Alpine does not ship a wine package for those arches.
      # We cross-compile the latest stable Wine from source using a musl.cc
      # GCC cross-toolchain (arm-linux-musleabihf or aarch64-linux-musl) with
      # the Alpine ARM rootfs as the target sysroot.  Only the features needed
      # for running console PE binaries (like PowerShell) are enabled; graphics,
      # sound, and most optional subsystems are disabled to keep the build fast.

      - name: Get latest Wine stable version
        id: wine_version
        run: |
          # Scrape the WineHQ download index for the latest X.0 stable release.
          MAJOR=$(curl -fsSL https://dl.winehq.org/wine/source/ \
            | grep -oP '(?<=href=")\d+\.\d+(?=/")' \
            | awk -F. '$2 == "0"' \
            | sort -V | tail -1)
          VER=$(curl -fsSL "https://dl.winehq.org/wine/source/${MAJOR}/" \
            | grep -oP "wine-\K[0-9]+\.[0-9]+(?=\.tar\.xz)" \
            | sort -V | tail -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"  >> "$GITHUB_OUTPUT"

      - name: Cache Alpine chroot with Wine
        id: cache_chroot
        uses: actions/cache@v5
        with:
          path: chroot.tar.zst
          key: alpine-${{ steps.vars.outputs.alpine_arch }}-wine-${{ steps.wine_version.outputs.version }}-v2

      # ── x86/x64: build chroot with apk wine ────────────────────────────────

      - name: Create Alpine chroot (x86/x64)
        if: steps.cache_chroot.outputs.cache-hit != 'true' && steps.vars.outputs.wine_cross == 'false'
        run: |
          set -e
          ALPINE_ARCH="${{ steps.vars.outputs.alpine_arch }}"
          ALPINE_MIRROR="https://dl-cdn.alpinelinux.org/alpine/latest-stable"

          # Download the latest Alpine mini rootfs for this architecture.
          FILE=$(curl -fsSL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/latest-releases.yaml" \
            | awk '/flavor: alpine-minirootfs/{found=1} found && /file:/{print $2; found=0}' \
            | head -1)
          curl -fL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/${FILE}" \
            -o alpine-rootfs.tar.gz
          sudo mkdir -p rootfs
          sudo tar -xzf alpine-rootfs.tar.gz -C rootfs
          rm alpine-rootfs.tar.gz

          # Set up name resolution and Alpine repositories (main + community).
          # wine is in the community repository.
          echo "nameserver 8.8.8.8" | sudo tee rootfs/etc/resolv.conf > /dev/null
          printf '%s/main\n%s/community\n' \
            "$ALPINE_MIRROR" "$ALPINE_MIRROR" \
            | sudo tee rootfs/etc/apk/repositories > /dev/null

          # Run apk without mounting /proc or /dev.  Alpine's musl-based packages
          # do not use ld.so.cache or other proc-dependent mechanisms, so post-
          # install scripts work fine without the bind mounts.
          # Use --no-scripts to skip any package that requires proc/sysfs.
          sudo chroot rootfs apk update
          sudo chroot rootfs apk add --no-cache --no-scripts wine

          # Exclude /proc and /dev from the archive to avoid capturing virtual-
          # filesystem files (which are write-only or produce EPERM on read).
          sudo tar --zstd -cf chroot.tar.zst \
            --exclude='./proc/*' --exclude='./dev/*' \
            -C rootfs .

      # ── ARM/ARM64: cross-compile Wine from source ───────────────────────────

      - name: Create Alpine chroot with cross-compiled Wine (ARM/ARM64)
        if: steps.cache_chroot.outputs.cache-hit != 'true' && steps.vars.outputs.wine_cross == 'true'
        run: |
          set -e
          ALPINE_ARCH="${{ steps.vars.outputs.alpine_arch }}"
          ALPINE_MIRROR="https://dl-cdn.alpinelinux.org/alpine/latest-stable"
          MUSL_TARGET="${{ steps.vars.outputs.musl_target }}"
          WINE_VERSION="${{ steps.wine_version.outputs.version }}"
          WINE_MAJOR="${{ steps.wine_version.outputs.major }}"
          SYSROOT="$PWD/rootfs"

          # ── 1. Alpine ARM mini rootfs ──────────────────────────────────────
          FILE=$(curl -fsSL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/latest-releases.yaml" \
            | awk '/flavor: alpine-minirootfs/{found=1} found && /file:/{print $2; found=0}' \
            | head -1)
          curl -fL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/${FILE}" \
            -o alpine-rootfs.tar.gz
          sudo mkdir -p "$SYSROOT"
          sudo tar -xzf alpine-rootfs.tar.gz -C "$SYSROOT"
          rm alpine-rootfs.tar.gz

          echo "nameserver 8.8.8.8" | sudo tee "$SYSROOT/etc/resolv.conf" > /dev/null
          printf '%s/main\n%s/community\n' \
            "$ALPINE_MIRROR" "$ALPINE_MIRROR" \
            | sudo tee "$SYSROOT/etc/apk/repositories" > /dev/null

          # ── 2. Install Wine build dependencies into the sysroot ────────────
          # Use the QEMU-emulated ARM chroot to run apk and install target-arch
          # development libraries into the rootfs.  These serve as both the
          # cross-compilation sysroot and the runtime environment for Wine.
          # musl-dev provides CRT startup files (crt1.o etc.) and static musl.
          # gcc provides the libgcc_s.so linker stub needed to resolve -lgcc_s
          # at link time.  libgcc provides the libgcc_s.so.1 runtime itself.
          # Use --no-scripts to skip any post-install hook that needs /proc.
          sudo chroot "$SYSROOT" apk update
          sudo chroot "$SYSROOT" apk add --no-cache --no-scripts \
            musl-dev \
            freetype-dev \
            zlib-dev \
            libgcc \
            gcc

          # ── 3. Set up llvm-mingw's clang as the musl cross-compiler ───────────
          # llvm-mingw ships clang for all LLVM targets (compilation), but its
          # lld has trouble linking Linux ELF against musl's libc.so linker
          # script (GROUP directive). Use Ubuntu's architecture-matched GNU ld
          # (arm-linux-gnueabihf-ld / aarch64-linux-gnu-ld) for the link step;
          # GNU ld handles musl's linker scripts correctly and supports --sysroot.
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          mkdir -p _musl_cross/bin

          # Select the Ubuntu cross-linker that matches our musl target arch.
          if [ "${MUSL_TARGET}" = "arm-linux-musleabihf" ]; then
            CROSS_LD_BIN="/usr/bin/arm-linux-gnueabihf-ld"
          else
            CROSS_LD_BIN="/usr/bin/aarch64-linux-gnu-ld"
          fi

          # gcc/g++ wrappers: embed absolute paths so they work from any cwd
          printf '#!/bin/sh\nexec clang --target=%s --sysroot=%s -fuse-ld=%s "$@"\n' \
            "${MUSL_TARGET}" "${SYSROOT}" "${CROSS_LD_BIN}" \
            > "_musl_cross/bin/${MUSL_TARGET}-gcc"
          printf '#!/bin/sh\nexec clang++ --target=%s --sysroot=%s -fuse-ld=%s "$@"\n' \
            "${MUSL_TARGET}" "${SYSROOT}" "${CROSS_LD_BIN}" \
            > "_musl_cross/bin/${MUSL_TARGET}-g++"
          chmod +x "_musl_cross/bin/${MUSL_TARGET}-gcc" \
                   "_musl_cross/bin/${MUSL_TARGET}-g++"

          # Archival / inspection tools come from the LLVM suite
          for TOOL in ar ranlib nm strip objcopy objdump; do
            ln -sf "$PWD/llvm-mingw/bin/llvm-${TOOL}" \
              "_musl_cross/bin/${MUSL_TARGET}-${TOOL}"
          done
          export PATH="$PWD/_musl_cross/bin:$PATH"

          # Alpine's gcc package installs libgcc under a vendor-specific triplet
          # (e.g. armv7-alpine-linux-musleabihf).  Create a symlink at the
          # canonical musl target triplet path so clang's GCC-installation
          # detection finds libgcc.a when resolving -rtlib=libgcc.
          GCC_SYSDIR=$(find "${SYSROOT}/usr/lib/gcc" \
            -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
          if [ -n "${GCC_SYSDIR}" ]; then
            sudo ln -sfn "${GCC_SYSDIR}" \
              "${SYSROOT}/usr/lib/gcc/${MUSL_TARGET}"
          fi

          # ── 4. Host build dependencies ────────────────────────────────────
          # flex/bison: Wine's widl/wrc parsers require them on the build host.
          # binutils-*: Ubuntu cross-linkers used by our clang wrappers above.
          if [ "${MUSL_TARGET}" = "arm-linux-musleabihf" ]; then
            CROSS_LD_PKG="binutils-arm-linux-gnueabihf"
          else
            CROSS_LD_PKG="binutils-aarch64-linux-gnu"
          fi
          sudo apt-get install -y flex bison "${CROSS_LD_PKG}"

          # ── 5. Wine source ─────────────────────────────────────────────────
          curl -fL \
            "https://dl.winehq.org/wine/source/${WINE_MAJOR}/wine-${WINE_VERSION}.tar.xz" \
            -o wine.tar.xz
          tar -xf wine.tar.xz
          rm wine.tar.xz
          WINE_SRC="$PWD/wine-${WINE_VERSION}"

          # ── 6. Build Wine host tools ───────────────────────────────────────
          # Wine's cross-compilation requires host (x86_64) binaries for
          # winebuild, widl, wmc, and wrc.  Always enable --enable-win64 so the
          # configure check for 'gcc -m32' is skipped (Ubuntu runners lack 32-bit
          # development libraries).  winebuild can still generate ARM32 PE stubs
          # when invoked with the correct --target flag; the host-tools bitness
          # only affects the ELF wrappers, not PE output.
          mkdir wine-tools-build && cd wine-tools-build
          "$WINE_SRC/configure" \
            --enable-win64 \
            --without-x \
            --without-opengl \
            --without-vulkan \
            --without-alsa \
            --without-pulse \
            --without-dbus \
            --without-gstreamer \
            --without-freetype \
            --without-cups \
            --without-v4l2 \
            --without-sane \
            --without-opencl \
            --without-pcap \
            --without-netapi \
            --without-ldap \
            --without-unwind \
            --without-usb \
            --without-capi \
            --without-osmesa \
            --without-png \
            --without-krb5 \
            --without-sdl2 \
            --without-udev \
            --without-pcsclite \
            --without-wayland \
            --disable-tests \
            --disable-nls
          make -j"$(nproc)" tools
          cd ..

          # ── 7. Cross-compile Wine for ${MUSL_TARGET} ──────────────────────
          # zlib is the only library dependency we keep; freetype is disabled so
          # no font-related configure checks need to pass through the sysroot.
          # PKG_CONFIG_SYSROOT_DIR causes pkg-config to prepend the sysroot
          # path to all returned -I and -L flags.
          mkdir wine-cross-build && cd wine-cross-build
          CC="${MUSL_TARGET}-gcc" \
          CXX="${MUSL_TARGET}-g++" \
          CFLAGS="-O2 -I${SYSROOT}/usr/include" \
          CXXFLAGS="-O2 -I${SYSROOT}/usr/include" \
          LDFLAGS="-L${SYSROOT}/usr/lib -Wl,-rpath-link,${SYSROOT}/usr/lib -Wl,-rpath-link,${SYSROOT}/lib" \
          PKG_CONFIG_LIBDIR="${SYSROOT}/usr/lib/pkgconfig:${SYSROOT}/usr/share/pkgconfig" \
          PKG_CONFIG_SYSROOT_DIR="${SYSROOT}" \
          "$WINE_SRC/configure" \
            --host="${MUSL_TARGET}" \
            --build=x86_64-linux-gnu \
            --with-wine-tools=../wine-tools-build \
            --prefix=/usr \
            --without-x \
            --without-opengl \
            --without-vulkan \
            --without-alsa \
            --without-pulse \
            --without-dbus \
            --without-gstreamer \
            --without-freetype \
            --without-v4l2 \
            --without-sane \
            --without-cups \
            --without-opencl \
            --without-pcap \
            --without-netapi \
            --without-ldap \
            --without-unwind \
            --without-usb \
            --without-capi \
            --without-osmesa \
            --without-png \
            --without-krb5 \
            --without-sdl2 \
            --without-udev \
            --without-pcsclite \
            --without-wayland \
            --disable-tests \
            --disable-nls
          make -j"$(nproc)"
          sudo make DESTDIR="${SYSROOT}" install
          cd ..

          # ── 8. Pack the chroot ─────────────────────────────────────────────
          # Exclude /proc and /dev to avoid capturing virtual-filesystem files
          # that are write-only or produce EPERM when read by tar.
          sudo tar --zstd -cf chroot.tar.zst \
            --exclude='./proc/*' --exclude='./dev/*' \
            -C rootfs .

      - name: Restore Alpine chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: sudo mkdir -p rootfs && sudo tar --zstd -xf chroot.tar.zst -C rootfs

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run hello.exe on WINE (${{ inputs.arch }})
        run: |
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          WINE_ARCH="${{ steps.vars.outputs.wine_arch }}"
          # Prefer wine64 for 64-bit Windows targets; fall back to wine if
          # wine64 is not available (some Alpine builds only ship 'wine').
          if [ "$WINE_ARCH" = "win64" ]; then
            WINE_BIN=$(sudo chroot rootfs sh -c \
              'command -v wine64 2>/dev/null || command -v wine')
          else
            WINE_BIN=$(sudo chroot rootfs sh -c 'command -v wine')
          fi
          echo "Using wine binary: $WINE_BIN"

          # Warm-up: initialise the Wine prefix (wineboot sets up the Windows
          # registry and virtual filesystem on the first run).  Redirect to
          # /dev/null rather than piping so that wineserver (a daemon fork)
          # cannot keep a pipe write-end open and block the shell.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
            timeout 300 "$WINE_BIN" /mnt/work/hello.exe > /dev/null 2>&1 || true

          # Shut down the warm-up wineserver; force-kill it if it does not
          # exit within 60 s (can happen under QEMU ARM emulation).
          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

          # Real run — prefix is now fully initialised.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
            timeout 120 "$WINE_BIN" /mnt/work/hello.exe

          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      - name: Run test.ps1 with PowerShell on WINE (${{ inputs.arch }})
        run: |
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          WINE_ARCH="${{ steps.vars.outputs.wine_arch }}"
          if [ "$WINE_ARCH" = "win64" ]; then
            WINE_BIN=$(sudo chroot rootfs sh -c \
              'command -v wine64 2>/dev/null || command -v wine')
          else
            WINE_BIN=$(sudo chroot rootfs sh -c 'command -v wine')
          fi

          # DOTNET_EnableDiagnostics=0 prevents .NET 8 from opening a
          # diagnostics IPC socket that can stall under Wine.
          # DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 skips ICU loading.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
                DOTNET_EnableDiagnostics=0 \
                DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
            timeout 300 "$WINE_BIN" \
              /mnt/work/powershell/pwsh.exe \
              -NonInteractive -File /mnt/work/test.ps1

          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hello-${{ inputs.arch }}
          path: hello.exe
          if-no-files-found: ignore
