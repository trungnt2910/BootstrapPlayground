name: Build (single arch)

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture: x86, x64, ARM, or ARM64'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ inputs.arch }}" in
            x86)
              echo "mingw_arch=i686"                        >> "$GITHUB_OUTPUT"
              echo "alpine_arch=x86"                        >> "$GITHUB_OUTPUT"
              echo "musl_target=i686-linux-musl"            >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x86"                          >> "$GITHUB_OUTPUT"
              echo "wine_archs=i386"                        >> "$GITHUB_OUTPUT"
              echo "alpine_host=i686-alpine-linux-musl"     >> "$GITHUB_OUTPUT"
              echo "clang_march="                           >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"                      >> "$GITHUB_OUTPUT"
              echo "alpine_arch=x86_64"                     >> "$GITHUB_OUTPUT"
              echo "musl_target=x86_64-linux-musl"          >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x64"                          >> "$GITHUB_OUTPUT"
              echo "wine_archs=x86_64"                      >> "$GITHUB_OUTPUT"
              echo "alpine_host=x86_64-alpine-linux-musl"  >> "$GITHUB_OUTPUT"
              echo "clang_march=-march=x86-64"              >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"                          >> "$GITHUB_OUTPUT"
              echo "alpine_arch=armv7"                         >> "$GITHUB_OUTPUT"
              echo "musl_target=armv7-linux-musleabihf"        >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                           >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm32"                           >> "$GITHUB_OUTPUT"
              echo "wine_archs=arm"                            >> "$GITHUB_OUTPUT"
              echo "alpine_host=arm-linux-musleabihf"          >> "$GITHUB_OUTPUT"
              echo "clang_march=-march=armv7-a -mfloat-abi=hard" >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64"                     >> "$GITHUB_OUTPUT"
              echo "alpine_arch=aarch64"                    >> "$GITHUB_OUTPUT"
              echo "musl_target=aarch64-linux-musl"         >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                        >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm64"                        >> "$GITHUB_OUTPUT"
              echo "wine_archs=aarch64"                     >> "$GITHUB_OUTPUT"
              echo "alpine_host=aarch64-alpine-linux-musl"  >> "$GITHUB_OUTPUT"
              echo "clang_march="                           >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v5
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ucrt-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          URL=$(gh api "repos/mstorsjo/llvm-mingw/releases/tags/${TAG}" \
            --jq '[.assets[]
                   | select(.name | test("ucrt-ubuntu-.*-x86_64\\.tar\\.xz$"))]
                  | sort_by(.name) | .[0].browser_download_url')
          curl -fL "$URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── Cross-compile hello.exe ─────────────────────────────────────────────

      - name: Cross-compile hello.exe for ${{ inputs.arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          "${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-clang++" \
            -static -o hello.exe hello.cpp

      # ── PowerShell ──────────────────────────────────────────────────────────

      - name: Download PowerShell for ${{ inputs.arch }}
        run: |
          PS_VERSION="7.4.0-preview.4"
          PS_ARCH="${{ steps.vars.outputs.pwsh_arch }}"
          curl -fL "https://github.com/PowerShell/PowerShell/releases/download/v${PS_VERSION}/PowerShell-${PS_VERSION}-win-${PS_ARCH}.zip" \
            -o powershell.zip
          mkdir -p powershell
          unzip -q powershell.zip -d powershell
          rm powershell.zip

      # ── QEMU user-mode emulation ────────────────────────────────────────────

      - name: Install QEMU user-mode emulation
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support
          echo "QEMU arm  : $(qemu-arm-static     --version | head -1)"
          echo "QEMU arm64: $(qemu-aarch64-static --version | head -1)"

      # ── Alpine chroot + Wine (all architectures) ───────────────────────────────
      #
      # All four architectures (x86, x64, ARM, ARM64) use the same approach:
      #   1. Download the latest Alpine mini rootfs for the target architecture
      #   2. Install musl-dev + gcc into the rootfs to serve as cross-compile sysroot
      #   3. Build Wine host tools (x86_64 ELF binaries) using the Ubuntu host GCC
      #   4. Cross-compile Wine from source with the llvm-mingw clang wrapper
      #   5. Install Wine into the Alpine rootfs and pack as chroot.tar.zst
      #
      # Linker selection:
      #   x86 / x64  — lld from llvm-mingw (handles elf_i386 / elf_x86_64 well)
      #   ARM / ARM64 — Ubuntu cross-binutils (arm-linux-gnueabihf-ld /
      #                 aarch64-linux-gnu-ld); these handle ARM ELF + musl's
      #                 libc.so GROUP linker script more reliably than lld.

      - name: Get latest Wine stable version
        id: wine_version
        run: |
          # Scrape the WineHQ download index for the latest X.0 stable release.
          MAJOR=$(curl -fsSL https://dl.winehq.org/wine/source/ \
            | grep -oP '(?<=href=")\d+\.\d+(?=/")' \
            | awk -F. '$2 == "0"' \
            | sort -V | tail -1)
          VER=$(curl -fsSL "https://dl.winehq.org/wine/source/${MAJOR}/" \
            | grep -oP "wine-\K[0-9]+\.[0-9]+(?=\.tar\.xz)" \
            | sort -V | tail -1)
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "major=${MAJOR}"  >> "$GITHUB_OUTPUT"

      - name: Cache Alpine chroot with Wine
        id: cache_chroot
        uses: actions/cache@v5
        with:
          path: chroot.tar.zst
          key: alpine-${{ steps.vars.outputs.alpine_arch }}-wine-${{ steps.wine_version.outputs.version }}-v11

      - name: Create Alpine chroot with cross-compiled Wine
        if: steps.cache_chroot.outputs.cache-hit != 'true'
        run: |
          set -e
          ALPINE_ARCH="${{ steps.vars.outputs.alpine_arch }}"
          ALPINE_MIRROR="https://dl-cdn.alpinelinux.org/alpine/latest-stable"
          MUSL_TARGET="${{ steps.vars.outputs.musl_target }}"
          WINE_VERSION="${{ steps.wine_version.outputs.version }}"
          WINE_MAJOR="${{ steps.wine_version.outputs.major }}"
          WINE_ARCHS="${{ steps.vars.outputs.wine_archs }}"
          ALPINE_HOST="${{ steps.vars.outputs.alpine_host }}"
          CLANG_MARCH="${{ steps.vars.outputs.clang_march }}"
          SYSROOT="$PWD/rootfs"

          export PATH="$PWD/llvm-mingw/bin:$PATH"

          # ── 1. Alpine mini rootfs ──────────────────────────────────────────
          FILE=$(curl -fsSL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/latest-releases.yaml" \
            | awk '/flavor: alpine-minirootfs/{found=1} found && /file:/{print $2; found=0}' \
            | head -1)
          curl -fL "${ALPINE_MIRROR}/releases/${ALPINE_ARCH}/${FILE}" \
            -o alpine-rootfs.tar.gz
          sudo mkdir -p "$SYSROOT"
          sudo tar -xzf alpine-rootfs.tar.gz -C "$SYSROOT"
          rm alpine-rootfs.tar.gz

          echo "nameserver 8.8.8.8" | sudo tee "$SYSROOT/etc/resolv.conf" > /dev/null
          printf '%s/main\n%s/community\n' \
            "$ALPINE_MIRROR" "$ALPINE_MIRROR" \
            | sudo tee "$SYSROOT/etc/apk/repositories" > /dev/null

          # ── 2. Install sysroot libraries ───────────────────────────────────
          sudo chroot "$SYSROOT" apk update
          sudo chroot "$SYSROOT" apk add --no-cache \
            musl-dev \
            linux-headers \
            zlib-dev \
            compiler-rt

          # Determine clang resource directory and compiler-rt library path
          # from the Alpine sysroot so that --rtlib=compiler-rt can find builtins.
          LLVM_VER=$(ls "$SYSROOT/usr/lib/clang/" | sort -V | tail -1)
          CLANG_RES="$SYSROOT/usr/lib/clang/$LLVM_VER"
          RT_LIB_PATH="$SYSROOT/usr/lib/clang/$LLVM_VER/lib/linux"
          CUSTOM_LD="lld"
          SUPPRESS_FLAGS="-Qunused-arguments"

          # ── 3. Host build dependencies ─────────────────────────────────────
          sudo apt-get install -y flex bison

          # ── 4. Wine source ─────────────────────────────────────────────────
          curl -fL \
            "https://dl.winehq.org/wine/source/${WINE_MAJOR}/wine-${WINE_VERSION}.tar.xz" \
            -o wine.tar.xz
          tar -xf wine.tar.xz
          rm wine.tar.xz
          WINE_SRC="$PWD/wine-${WINE_VERSION}"

          # ── 5. Build Wine host tools ───────────────────────────────────────
          mkdir -p wine-tools-build && cd wine-tools-build
          CC="clang" CXX="clang++" \
          "$WINE_SRC/configure" \
            --enable-archs=x86_64 \
            --disable-win16 --disable-tests \
            --without-x \
            --without-alsa --without-capi --without-coreaudio --without-cups \
            --without-dbus --without-ffmpeg --without-fontconfig --without-freetype \
            --without-gettext --without-gphoto --without-gnutls --without-gssapi \
            --without-gstreamer --without-hwloc --without-inotify --without-krb5 \
            --without-netapi --without-opencl --without-opengl --without-oss \
            --without-pcap --without-pcsclite --without-pthread --without-pulse \
            --without-sane --without-sdl --without-udev --without-unwind \
            --without-usb --without-v4l2 --without-vulkan --without-wayland \
            --without-xcomposite --without-xcursor --without-xfixes --without-xinerama \
            --without-xinput --without-xinput2 --without-xrandr --without-xrender \
            --without-xshape --without-xshm --without-xxf86vm
          make -j"$(nproc)" __tooldeps__
          cd ..

          # ── 6. Cross-compile Wine ──────────────────────────────────────────
          mkdir -p wine-cross-build && cd wine-cross-build
          "$WINE_SRC/configure" \
            --host="${ALPINE_HOST}" \
            --with-wine-tools=../wine-tools-build \
            --enable-archs="${WINE_ARCHS}" \
            --disable-tests --disable-win16 \
            --without-x \
            --without-alsa --without-capi --without-coreaudio --without-cups \
            --without-dbus --without-ffmpeg --without-fontconfig --without-freetype \
            --without-gettext --without-gphoto --without-gnutls --without-gssapi \
            --without-gstreamer --without-hwloc --without-inotify --without-krb5 \
            --without-netapi --without-opencl --without-opengl --without-oss \
            --without-pcap --without-pcsclite --without-pthread --without-pulse \
            --without-sane --without-sdl --without-udev --without-unwind \
            --without-usb --without-v4l2 --without-vulkan --without-wayland \
            --without-xcomposite --without-xcursor --without-xfixes --without-xinerama \
            --without-xinput --without-xinput2 --without-xrandr --without-xrender \
            --without-xshape --without-xshm --without-xxf86vm \
            LD="${CUSTOM_LD}" \
            CC="clang -target ${MUSL_TARGET} --sysroot=${SYSROOT} ${CLANG_MARCH} -resource-dir=${CLANG_RES} -fuse-ld=${CUSTOM_LD} ${SUPPRESS_FLAGS}" \
            CXX="clang++ -target ${MUSL_TARGET} --sysroot=${SYSROOT} ${CLANG_MARCH} -resource-dir=${CLANG_RES} -fuse-ld=${CUSTOM_LD} ${SUPPRESS_FLAGS}" \
            CFLAGS="-I${SYSROOT}/usr/include ${SUPPRESS_FLAGS}" \
            CXXFLAGS="-I${SYSROOT}/usr/include ${SUPPRESS_FLAGS}" \
            EXTRACFLAGS="${SUPPRESS_FLAGS}" \
            CROSSCC="${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-clang" \
            LDFLAGS="-fuse-ld=${CUSTOM_LD} --rtlib=compiler-rt --unwindlib=none -L${SYSROOT}/usr/lib -L${SYSROOT}/lib -L${RT_LIB_PATH}" \
            CPPFLAGS="-I${SYSROOT}/usr/include" \
            ac_cv_cflags__Werror_unused_command_line_argument=no \
            ac_cv_cxxflags__Werror_unused_command_line_argument=no \
            wine_cv_cflags__Werror_unused_command_line_argument=no \
            wine_cv_cxxflags__Werror_unused_command_line_argument=no
          make -j"$(nproc)"
          sudo make DESTDIR="${SYSROOT}" install
          cd ..

          # ── 7. Pack the chroot ─────────────────────────────────────────────
          sudo tar --zstd -cf chroot.tar.zst \
            --exclude='./proc/*' --exclude='./dev/*' \
            -C rootfs .

      - name: Restore Alpine chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: sudo mkdir -p rootfs && sudo tar --zstd -xf chroot.tar.zst -C rootfs

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run hello.exe on WINE (${{ inputs.arch }})
        run: |
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          WINE_ARCH="${{ steps.vars.outputs.wine_arch }}"
          # Prefer wine64 for 64-bit Windows targets; fall back to wine if
          # wine64 is not available (some Alpine builds only ship 'wine').
          if [ "$WINE_ARCH" = "win64" ]; then
            WINE_BIN=$(sudo chroot rootfs sh -c \
              'command -v wine64 2>/dev/null || command -v wine')
          else
            WINE_BIN=$(sudo chroot rootfs sh -c 'command -v wine')
          fi
          echo "Using wine binary: $WINE_BIN"

          # Warm-up: initialise the Wine prefix (wineboot sets up the Windows
          # registry and virtual filesystem on the first run).  Redirect to
          # /dev/null rather than piping so that wineserver (a daemon fork)
          # cannot keep a pipe write-end open and block the shell.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
            timeout 300 "$WINE_BIN" /mnt/work/hello.exe > /dev/null 2>&1 || true

          # Shut down the warm-up wineserver; force-kill it if it does not
          # exit within 60 s (can happen under QEMU ARM emulation).
          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

          # Real run — prefix is now fully initialised.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
            timeout 120 "$WINE_BIN" /mnt/work/hello.exe

          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      - name: Run test.ps1 with PowerShell on WINE (${{ inputs.arch }})
        run: |
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          WINE_ARCH="${{ steps.vars.outputs.wine_arch }}"
          if [ "$WINE_ARCH" = "win64" ]; then
            WINE_BIN=$(sudo chroot rootfs sh -c \
              'command -v wine64 2>/dev/null || command -v wine')
          else
            WINE_BIN=$(sudo chroot rootfs sh -c 'command -v wine')
          fi

          # DOTNET_EnableDiagnostics=0 prevents .NET 8 from opening a
          # diagnostics IPC socket that can stall under Wine.
          # DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 skips ICU loading.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all WINEARCH="$WINE_ARCH" \
                DOTNET_EnableDiagnostics=0 \
                DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
            timeout 300 "$WINE_BIN" \
              /mnt/work/powershell/pwsh.exe \
              -NonInteractive -File /mnt/work/test.ps1

          sudo chroot rootfs env HOME=/tmp \
            timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hello-${{ inputs.arch }}
          path: hello.exe
          if-no-files-found: ignore
