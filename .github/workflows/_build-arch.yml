name: Build (single arch)

on:
  workflow_call:
    inputs:
      arch:
        description: 'Target architecture: x86, x64, ARM, or ARM64'
        required: true
        type: string

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ inputs.arch }}" in
            x86)
              echo "mingw_arch=i686"                       >> "$GITHUB_OUTPUT"
              echo "debian_arch=i386"                      >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=i386-linux-gnu"       >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                       >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x86"                         >> "$GITHUB_OUTPUT"
              echo "ubuntu_mirror=http://archive.ubuntu.com/ubuntu" >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"                     >> "$GITHUB_OUTPUT"
              echo "debian_arch=amd64"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=x86_64-linux-gnu"     >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                       >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=x64"                         >> "$GITHUB_OUTPUT"
              echo "ubuntu_mirror=http://archive.ubuntu.com/ubuntu" >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"                      >> "$GITHUB_OUTPUT"
              echo "debian_arch=armhf"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=arm-linux-gnueabihf"  >> "$GITHUB_OUTPUT"
              echo "wine_arch=win32"                       >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm32"                       >> "$GITHUB_OUTPUT"
              echo "ubuntu_mirror=http://ports.ubuntu.com/ubuntu-ports" >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64"                    >> "$GITHUB_OUTPUT"
              echo "debian_arch=arm64"                     >> "$GITHUB_OUTPUT"
              echo "debian_multiarch=aarch64-linux-gnu"    >> "$GITHUB_OUTPUT"
              echo "wine_arch=win64"                       >> "$GITHUB_OUTPUT"
              echo "pwsh_arch=arm64"                       >> "$GITHUB_OUTPUT"
              echo "ubuntu_mirror=http://ports.ubuntu.com/ubuntu-ports" >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v5
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ucrt-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          # Select the UCRT Ubuntu x86_64 tarball.  When multiple Ubuntu versions
          # are published for the same release, sort_by(.name) picks the oldest
          # Ubuntu version first (e.g. ubuntu-20.04 before ubuntu-22.04) for
          # maximum runner compatibility.
          URL=$(gh api "repos/mstorsjo/llvm-mingw/releases/tags/${TAG}" \
            --jq '[.assets[]
                   | select(.name | test("ucrt-ubuntu-.*-x86_64\\.tar\\.xz$"))]
                  | sort_by(.name) | .[0].browser_download_url')
          curl -fL "$URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── Cross-compile hello.exe ─────────────────────────────────────────────

      - name: Cross-compile hello.exe for ${{ inputs.arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          # Use clang++ explicitly to ensure llvm-mingw's clang is the compiler,
          # not the system gcc that the generic c++ wrapper might resolve to.
          "${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-clang++" \
            -static -o hello.exe hello.cpp

      # ── PowerShell ──────────────────────────────────────────────────────────

      - name: Download PowerShell for ${{ inputs.arch }}
        run: |
          PS_VERSION="7.4.0-preview.4"
          PS_ARCH="${{ steps.vars.outputs.pwsh_arch }}"
          curl -fL "https://github.com/PowerShell/PowerShell/releases/download/v${PS_VERSION}/PowerShell-${PS_VERSION}-win-${PS_ARCH}.zip" \
            -o powershell.zip
          mkdir -p powershell
          unzip -q powershell.zip -d powershell
          rm powershell.zip

      # ── QEMU + Ubuntu Noble chroot + WINE ──────────────────────────────────

      - name: Install QEMU user-mode emulation and debootstrap
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap
          echo "QEMU arm  : $(qemu-arm-static     --version | head -1)"
          echo "QEMU arm64: $(qemu-aarch64-static --version | head -1)"

      - name: Cache Ubuntu Noble chroot with WINE
        id: cache_chroot
        uses: actions/cache@v5
        with:
          path: chroot.tar.zst
          key: chroot-noble-${{ steps.vars.outputs.debian_arch }}-wine

      - name: Create Ubuntu Noble chroot and install WINE
        if: steps.cache_chroot.outputs.cache-hit != 'true'
        run: |
          DEBIAN_ARCH="${{ steps.vars.outputs.debian_arch }}"
          UBUNTU_MIRROR="${{ steps.vars.outputs.ubuntu_mirror }}"

          # Bootstrap an Ubuntu Noble (24.04 LTS) root filesystem for the target
          # arch.  Noble ships Wine 9.0 in the universe component, which resolves:
          #   - x64/ARM64: Wine 8.x named-pipe hang under .NET 8 diagnostics
          #   - ARM32: Wine 8.x Thumb-2 PE-loader code that triggers the QEMU TCG
          #            assertion thumb_tr_translate_insn (dc->base.pc_next & 1) == 0
          # Using the same Ubuntu Noble base for every architecture ensures
          # consistent behaviour across x86, x64, ARM, and ARM64.
          # qemu-debootstrap handles the QEMU-assisted second stage automatically
          # for foreign architectures; for native arches it behaves like plain
          # debootstrap.
          # DEBIAN_FRONTEND=noninteractive prevents packages such as
          # console-setup-linux and keyboard-configuration from opening an
          # interactive debconf prompt during the second-stage configuration,
          # which would block indefinitely in a non-TTY CI environment.
          sudo env DEBIAN_FRONTEND=noninteractive qemu-debootstrap \
            --arch="$DEBIAN_ARCH" \
            --components=main,universe \
            noble rootfs \
            "$UBUNTU_MIRROR"

          # After qemu-debootstrap, binfmt_misc is registered on the host for
          # every foreign architecture.  Chroot commands can be invoked directly
          # without specifying the QEMU interpreter explicitly — the kernel
          # dispatches foreign ELF binaries through binfmt_misc automatically.
          sudo chroot rootfs apt-get update -q

          # Detect the latest Wine version available in the distro's repository.
          WINE_VERSION=$(sudo chroot rootfs apt-cache policy wine \
            | grep Candidate | awk '{print $2}')
          echo "Latest available Wine version for ${DEBIAN_ARCH}: ${WINE_VERSION}"

          # Install Wine.
          sudo chroot rootfs env DEBIAN_FRONTEND=noninteractive apt-get install -y wine

          # Pack the chroot for caching (zstd for a good speed/size trade-off).
          sudo tar --zstd -cf chroot.tar.zst rootfs

      - name: Restore Ubuntu Noble chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd -xf chroot.tar.zst
          # Refresh the QEMU static binary so the chroot always uses the version
          # installed on the host, even when the tarball was built with an older one.
          for qemu_bin in /usr/bin/qemu-arm-static /usr/bin/qemu-aarch64-static; do
            base=$(basename "$qemu_bin")
            if [ -f "$qemu_bin" ] && [ -f "rootfs/usr/bin/$base" ]; then
              sudo cp "$qemu_bin" "rootfs/usr/bin/$base"
            fi
          done

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run hello.exe on WINE (${{ inputs.arch }})
        run: |
          # Bind-mount /proc, /dev, and the workspace into the chroot so that
          # Wine's wineserver can access kernel interfaces and hello.exe is
          # accessible at /mnt/work/hello.exe inside the chroot.
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          # Step 1: Warm-up run to initialize the Wine prefix.
          # On the very first run Wine runs wineboot.exe internally to set up the
          # Windows registry and virtual filesystem.  After initialization,
          # wineboot exits with code 53 ("configuration updated / reboot
          # required") and Wine exits without running the requested program.
          # We tolerate any exit code here; the purpose is only to populate the
          # prefix so the real run below can skip initialization entirely.
          # WINEDLLPATH must be set inside the chroot environment (after chroot)
          # so that it refers to paths within the chroot, not the host.
          #
          # Use timeout inside the chroot to bound execution time.  Under QEMU
          # user-mode emulation (arm, arm64) Wine can hang indefinitely if the
          # emulator does not handle a syscall correctly.
          # Redirect output to /dev/null rather than piping through head(1):
          # piping leaves the pipe write-end open via the wineserver daemon,
          # causing head(1) to block forever waiting for a pipe EOF that never
          # arrives.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all \
                WINEDLLPATH=/usr/lib/${{ steps.vars.outputs.debian_multiarch }}/wine \
                WINEARCH=${{ steps.vars.outputs.wine_arch }} \
            timeout 300 wine /mnt/work/hello.exe > /dev/null 2>&1 || true

          # Shut down the warm-up wineserver before starting a fresh session.
          # Give it up to 60 s to exit on its own; if it doesn't, force-kill it
          # so the real run below starts with a clean server state.
          sudo chroot rootfs env HOME=/tmp timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

          # Step 2: Run hello.exe for real.
          # The prefix is now fully initialized so Wine skips wineboot and
          # executes hello.exe directly.
          # timeout guards against a hang if, despite the warm-up, Wine's
          # initialization did not complete (e.g., warm-up was killed by its
          # own timeout on slow QEMU targets).
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all \
                WINEDLLPATH=/usr/lib/${{ steps.vars.outputs.debian_multiarch }}/wine \
                WINEARCH=${{ steps.vars.outputs.wine_arch }} \
            timeout 120 wine /mnt/work/hello.exe

          # Wait for wineserver to shut down cleanly.
          sudo chroot rootfs env HOME=/tmp timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      - name: Run test.ps1 with PowerShell on WINE (${{ inputs.arch }})
        run: |
          sudo mkdir -p rootfs/mnt/work
          sudo mount --bind /proc  rootfs/proc
          sudo mount --bind /dev   rootfs/dev
          sudo mount --bind "$PWD" rootfs/mnt/work
          trap 'sudo umount rootfs/mnt/work 2>/dev/null || true
                sudo umount rootfs/dev        2>/dev/null || true
                sudo umount rootfs/proc       2>/dev/null || true' EXIT

          # The Wine prefix is already fully initialised by the hello.exe step
          # above, so no warm-up is needed here.
          #
          # DOTNET_EnableDiagnostics=0 prevents the .NET 8 runtime from opening a
          # diagnostics IPC socket on startup; without it Wine hangs indefinitely
          # waiting for that socket under 64-bit Wine.
          # DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 skips ICU loading, which can
          # also stall startup in Wine environments that lack the library.
          sudo chroot rootfs \
            env HOME=/tmp WINEDEBUG=-all \
                WINEDLLPATH=/usr/lib/${{ steps.vars.outputs.debian_multiarch }}/wine \
                WINEARCH=${{ steps.vars.outputs.wine_arch }} \
                DOTNET_EnableDiagnostics=0 \
                DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=1 \
            wine /mnt/work/powershell/pwsh.exe -NonInteractive -File /mnt/work/test.ps1

          # Wait for wineserver to shut down cleanly.
          sudo chroot rootfs env HOME=/tmp timeout 60 wineserver -w 2>/dev/null || \
            sudo chroot rootfs env HOME=/tmp wineserver -k 2>/dev/null || true

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: hello-${{ inputs.arch }}
          path: hello.exe
          if-no-files-found: ignore
