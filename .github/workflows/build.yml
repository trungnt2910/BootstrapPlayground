name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ matrix.arch }}" in
            x86)
              echo "mingw_arch=i686"    >> "$GITHUB_OUTPUT"
              echo "qemu_arch=i386"     >> "$GITHUB_OUTPUT"
              echo "debian_arch=i386"   >> "$GITHUB_OUTPUT"
              echo "wine_cmd=wine"      >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"  >> "$GITHUB_OUTPUT"
              echo "qemu_arch=x86_64"   >> "$GITHUB_OUTPUT"
              echo "debian_arch=amd64"  >> "$GITHUB_OUTPUT"
              echo "wine_cmd=wine64"    >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"   >> "$GITHUB_OUTPUT"
              echo "qemu_arch=arm"      >> "$GITHUB_OUTPUT"
              echo "debian_arch=armhf"  >> "$GITHUB_OUTPUT"
              echo "wine_cmd=wine"      >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64" >> "$GITHUB_OUTPUT"
              echo "qemu_arch=aarch64"  >> "$GITHUB_OUTPUT"
              echo "debian_arch=arm64"  >> "$GITHUB_OUTPUT"
              echo "wine_cmd=wine"      >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v4
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          URL="https://github.com/mstorsjo/llvm-mingw/releases/download/${TAG}/llvm-mingw-${TAG}-ucrt-ubuntu-22.04-x86_64.tar.xz"
          wget -q "$URL" -O llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── Cross-compile ───────────────────────────────────────────────────────

      - name: Cross-compile hello.exe for ${{ matrix.arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          "${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-c++" -o hello.exe hello.cpp

      # ── QEMU + Debian chroot + WINE ─────────────────────────────────────────

      - name: Install QEMU user-mode emulation and debootstrap
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap

      - name: Cache Debian bookworm chroot with WINE
        id: cache_chroot
        uses: actions/cache@v4
        with:
          path: chroot.tar.zst
          key: chroot-bookworm-${{ steps.vars.outputs.debian_arch }}-wine-v1

      - name: Create Debian chroot and install WINE
        if: steps.cache_chroot.outputs.cache-hit != 'true'
        run: |
          DEBIAN_ARCH="${{ steps.vars.outputs.debian_arch }}"
          QEMU_ARCH="${{ steps.vars.outputs.qemu_arch }}"

          # Bootstrap a Debian bookworm root filesystem for the target arch.
          # qemu-debootstrap handles the QEMU-assisted second stage automatically
          # for foreign architectures; for native arches it behaves like plain
          # debootstrap.
          sudo qemu-debootstrap \
            --arch="$DEBIAN_ARCH" \
            bookworm /chroot \
            http://deb.debian.org/debian

          # Copy the current QEMU static binary into the chroot so that we can
          # invoke it explicitly (satisfying "run under emulation even if the
          # host matches the target architecture").
          sudo cp /usr/bin/qemu-${QEMU_ARCH}-static /chroot/usr/bin/

          # Detect the latest Wine version available in the distro's repository.
          sudo chroot /chroot apt-get update -q
          WINE_VERSION=$(sudo chroot /chroot \
            /usr/bin/qemu-${QEMU_ARCH}-static \
            /usr/bin/apt-cache policy wine \
            | grep Candidate | awk '{print $2}')
          echo "Latest available Wine version for ${DEBIAN_ARCH}: ${WINE_VERSION}"

          # Install Wine.  On amd64 we install wine64 directly (avoids the need
          # to enable i386 multiarch for wine32).  On every other architecture
          # the distro's 'wine' metapackage is the right choice.
          if [ "$DEBIAN_ARCH" = "amd64" ]; then
            sudo chroot /chroot \
              /usr/bin/qemu-${QEMU_ARCH}-static \
              /usr/bin/apt-get install -y wine64
          else
            sudo chroot /chroot \
              /usr/bin/qemu-${QEMU_ARCH}-static \
              /usr/bin/apt-get install -y wine
          fi

          # Pack the chroot for caching (zstd for a good speed/size trade-off).
          sudo tar --zstd -cf chroot.tar.zst -C / chroot

      - name: Restore Debian chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd -xf chroot.tar.zst -C /

      # Always refresh the QEMU binary inside the chroot so that a stale cached
      # copy never causes a version mismatch with the host binfmt registration.
      - name: Refresh QEMU static binary inside chroot
        run: |
          QEMU_ARCH="${{ steps.vars.outputs.qemu_arch }}"
          sudo cp /usr/bin/qemu-${QEMU_ARCH}-static /chroot/usr/bin/

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run hello.exe under WINE via QEMU (${{ matrix.arch }})
        run: |
          QEMU_ARCH="${{ steps.vars.outputs.qemu_arch }}"
          WINE_CMD="${{ steps.vars.outputs.wine_cmd }}"
          sudo cp hello.exe /chroot/hello.exe
          # Explicitly invoke the QEMU static binary so that execution goes
          # through software emulation even when the host arch matches the
          # target (e.g. x64 build on an x86_64 runner).
          sudo chroot /chroot \
            /usr/bin/qemu-${QEMU_ARCH}-static \
            /usr/bin/env HOME=/tmp WINEDEBUG=-all \
            /usr/bin/${WINE_CMD} /hello.exe

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.arch }}
          path: hello.exe
          if-no-files-found: ignore

  # ── Release job ─────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build
    # Only run when every matrix build job succeeded.
    if: ${{ success() }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organise binaries into Windows-style architecture subfolders
        run: |
          for ARCH in x86 x64 ARM ARM64; do
            mkdir -p "release/$ARCH"
            cp "artifacts/hello-$ARCH/hello.exe" "release/$ARCH/hello.exe"
          done

      - name: Determine release version (YYYYMMDD.XX)
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y%m%d)
          # Count releases whose tag starts with today's date (any suffix).
          COUNT=$(gh api repos/${{ github.repository }}/releases \
            --paginate --jq '.[].tag_name' \
            | grep -c "^${DATE}" || true)
          echo "version=${DATE}.$((COUNT + 1))" >> "$GITHUB_OUTPUT"

      - name: Create release ZIP
        run: |
          cd release
          zip -r "../BootstrapPlayground-${{ steps.version.outputs.version }}.zip" .

      - name: Upload release ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: BootstrapPlayground-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release and tag commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Automated release $VERSION" \
            "BootstrapPlayground-${VERSION}.zip"
