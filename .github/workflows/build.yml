name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]
    uses: ./.github/workflows/_build-arch.yml
    with:
      arch: ${{ matrix.arch }}
    secrets: inherit

  # ── Release job ─────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build
    # Only run when every matrix build job succeeded.
    if: ${{ success() }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Organize binaries into Windows-style architecture subfolders
        run: |
          for ARCH in x86 x64 ARM ARM64; do
            mkdir -p "release/$ARCH"
            cp "artifacts/binaries-$ARCH/hello.exe"                       "release/$ARCH/hello.exe"
            cp "artifacts/binaries-$ARCH/test_host/test_host.exe"         "release/$ARCH/test_host.exe"
            cp "artifacts/binaries-$ARCH/test_driver/test_driver.sys"     "release/$ARCH/test_driver.sys"
          done

      - name: Determine release version (YYYYMMDD.XX)
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y%m%d)
          # Count releases whose tag starts with today's date (any suffix).
          COUNT=$(gh api repos/${{ github.repository }}/releases \
            --paginate --jq '.[].tag_name' \
            | grep -c "^${DATE}" || true)
          echo "version=${DATE}.$((COUNT + 1))" >> "$GITHUB_OUTPUT"

      - name: Create release ZIP
        run: |
          cd release
          zip -r "../BootstrapPlayground-${{ steps.version.outputs.version }}.zip" .

      - name: Upload release as workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ steps.version.outputs.version }}
          path: release/

      - name: Create GitHub Release and tag commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Automated release $VERSION" \
            "BootstrapPlayground-${VERSION}.zip"
