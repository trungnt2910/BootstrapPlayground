name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x86, x64, ARM, ARM64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up architecture variables
        id: vars
        run: |
          case "${{ matrix.arch }}" in
            x86)
              echo "mingw_arch=i686"    >> "$GITHUB_OUTPUT"
              echo "qemu_arch=i386"     >> "$GITHUB_OUTPUT"
              echo "debian_arch=i386"   >> "$GITHUB_OUTPUT"
              ;;
            x64)
              echo "mingw_arch=x86_64"  >> "$GITHUB_OUTPUT"
              echo "qemu_arch=x86_64"   >> "$GITHUB_OUTPUT"
              echo "debian_arch=amd64"  >> "$GITHUB_OUTPUT"
              ;;
            ARM)
              echo "mingw_arch=armv7"   >> "$GITHUB_OUTPUT"
              echo "qemu_arch=arm"      >> "$GITHUB_OUTPUT"
              echo "debian_arch=armhf"  >> "$GITHUB_OUTPUT"
              ;;
            ARM64)
              echo "mingw_arch=aarch64" >> "$GITHUB_OUTPUT"
              echo "qemu_arch=aarch64"  >> "$GITHUB_OUTPUT"
              echo "debian_arch=arm64"  >> "$GITHUB_OUTPUT"
              ;;
          esac

      # ── llvm-mingw toolchain ────────────────────────────────────────────────

      - name: Get latest llvm-mingw release tag
        id: llvm_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh api repos/mstorsjo/llvm-mingw/releases/latest --jq .tag_name)
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Cache llvm-mingw toolchain
        id: cache_llvm
        uses: actions/cache@v4
        with:
          path: llvm-mingw
          key: llvm-mingw-${{ steps.llvm_release.outputs.tag }}-ucrt-ubuntu-x86_64

      - name: Download and extract llvm-mingw
        if: steps.cache_llvm.outputs.cache-hit != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.llvm_release.outputs.tag }}"
          # Pick the UCRT Ubuntu x86_64 tarball.  When multiple Ubuntu versions
          # are published for the same release, sort_by(.name) yields the oldest
          # first (e.g. ubuntu-20.04 before ubuntu-22.04) for maximum runner
          # compatibility.
          URL=$(gh api "repos/mstorsjo/llvm-mingw/releases/tags/${TAG}" \
            --jq '[.assets[]
                   | select(.name | test("ucrt-ubuntu-.*-x86_64\\.tar\\.xz$"))]
                  | sort_by(.name) | .[0].browser_download_url')
          curl -fL "$URL" -o llvm-mingw.tar.xz
          mkdir llvm-mingw
          tar -xf llvm-mingw.tar.xz --strip-components=1 -C llvm-mingw
          rm llvm-mingw.tar.xz

      # ── Cross-compile hello.exe ─────────────────────────────────────────────

      - name: Cross-compile hello.exe for ${{ matrix.arch }}
        run: |
          export PATH="$PWD/llvm-mingw/bin:$PATH"
          "${{ steps.vars.outputs.mingw_arch }}-w64-mingw32-c++" -o hello.exe hello.cpp

      # ── Build statically-linked Bash for Windows ────────────────────────────
      #
      # bash is cross-compiled with llvm-mingw and linked fully statically so
      # that no DLLs need to be copied into the Wine environment.  The build is
      # cached per architecture; only the resulting bash.exe is kept (not the
      # entire source+object tree).

      - name: Cache Bash for Windows (${{ matrix.arch }})
        id: cache_bash
        uses: actions/cache@v4
        with:
          path: bash.exe
          key: bash-5.2.37-${{ matrix.arch }}-llvm-mingw-static-v1

      - name: Build statically-linked Bash for Windows (${{ matrix.arch }})
        if: steps.cache_bash.outputs.cache-hit != 'true'
        run: |
          TARGET="${{ steps.vars.outputs.mingw_arch }}-w64-mingw32"
          export PATH="$PWD/llvm-mingw/bin:$PATH"

          curl -fL "https://ftp.gnu.org/gnu/bash/bash-5.2.37.tar.gz" \
            -o bash.tar.gz
          tar -xf bash.tar.gz
          cd bash-5.2.37

          # Cross-compile configure flags for a minimal statically-linked
          # Windows PE.  Readline, NLS, job control and interactive history are
          # all disabled — we only need non-interactive script execution.
          # Several cache variables must be preset because cross-compilation
          # cannot run the target's binaries to probe them.
          ./configure \
            --host="$TARGET" \
            --build=x86_64-linux-gnu \
            --without-bash-malloc \
            --without-readline \
            --disable-nls \
            --disable-history \
            --disable-bang-history \
            --disable-job-control \
            --disable-directory-stack \
            --disable-alias \
            --disable-progcomp \
            --disable-prompt-string-decoding \
            --disable-net-redirections \
            bash_cv_have_mbstate_t=yes \
            bash_cv_getcwd_malloc=yes \
            bash_cv_func_sigsetjmp=present \
            bash_cv_opendir_not_robust=yes \
            bash_cv_ulimit_maxfds=yes \
            bash_cv_must_reinstall_sighandlers=no \
            bash_cv_job_control_missing=missing \
            bash_cv_sys_named_pipes=missing \
            LDFLAGS="-static" \
            CFLAGS="-O2"

          make -j$(nproc)
          cp bash.exe "$GITHUB_WORKSPACE/bash.exe"
          cd "$GITHUB_WORKSPACE"
          rm -rf bash-5.2.37 bash.tar.gz

      # ── QEMU + Debian chroot + WINE ─────────────────────────────────────────

      - name: Install QEMU user-mode emulation and debootstrap
        run: |
          sudo apt-get update -q
          sudo apt-get install -y qemu-user-static binfmt-support debootstrap

      - name: Cache Debian bookworm chroot with WINE
        id: cache_chroot
        uses: actions/cache@v4
        with:
          path: chroot.tar.zst
          key: chroot-bookworm-${{ steps.vars.outputs.debian_arch }}-wine-v2

      - name: Create Debian chroot and install WINE
        if: steps.cache_chroot.outputs.cache-hit != 'true'
        run: |
          DEBIAN_ARCH="${{ steps.vars.outputs.debian_arch }}"

          # Bootstrap a Debian bookworm root filesystem for the target arch.
          # qemu-debootstrap handles the QEMU-assisted second stage automatically
          # for foreign architectures; for native arches it behaves like plain
          # debootstrap.
          sudo qemu-debootstrap \
            --arch="$DEBIAN_ARCH" \
            bookworm /chroot \
            http://deb.debian.org/debian

          # After qemu-debootstrap, binfmt_misc is registered on the host for
          # every foreign architecture.  Chroot commands can be invoked directly
          # without specifying the QEMU interpreter explicitly — the kernel
          # dispatches foreign ELF binaries through binfmt_misc automatically.
          sudo chroot /chroot apt-get update -q

          # Detect the latest Wine version available in the distro's repository.
          WINE_VERSION=$(sudo chroot /chroot apt-cache policy wine \
            | grep Candidate | awk '{print $2}')
          echo "Latest available Wine version for ${DEBIAN_ARCH}: ${WINE_VERSION}"

          # Install Wine.
          sudo chroot /chroot apt-get install -y wine

          # Pack the chroot for caching (zstd for a good speed/size trade-off).
          sudo tar --zstd -cf chroot.tar.zst -C / chroot

      - name: Restore Debian chroot from cache
        if: steps.cache_chroot.outputs.cache-hit == 'true'
        run: |
          sudo tar --zstd -xf chroot.tar.zst -C /

      # ── Run under emulation ─────────────────────────────────────────────────

      - name: Run hello.sh via bash.exe on WINE (${{ matrix.arch }})
        run: |
          sudo cp hello.exe /chroot/hello.exe
          sudo cp bash.exe  /chroot/bash.exe
          sudo cp hello.sh  /chroot/hello.sh

          # Bind-mount /proc and /dev so that Wine's wineserver can access
          # kernel interfaces (e.g. /proc/self/fd, /dev/urandom).
          sudo mount --bind /proc /chroot/proc
          sudo mount --bind /dev  /chroot/dev
          trap 'sudo umount /chroot/dev  2>/dev/null || true
                sudo umount /chroot/proc 2>/dev/null || true' EXIT

          # binfmt_misc (F flag) transparently routes foreign-arch Wine ELF
          # binaries through qemu-<arch>-static on exec().  For x64, Wine runs
          # natively on the x86_64 runner.
          #
          # QEMU_EXECVE=1 additionally instructs qemu-user to intercept any
          # execve(2) call made from within the emulated process and re-route it
          # back through qemu-static.  This ensures that every Linux ELF spawned
          # from inside the QEMU sandbox is itself emulated, preventing execution
          # from ever returning to native host code.
          #
          # hello.exe is a Windows PE binary.  bash.exe launches it via the
          # Win32 CreateProcess() API, which Wine handles entirely internally —
          # no Linux execve() is issued for PE files, so hello.exe never leaves
          # the Wine API-translation layer.
          sudo chroot /chroot \
            env HOME=/tmp WINEDEBUG=-all QEMU_EXECVE=1 \
            wine /bash.exe Z:/hello.sh

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload binary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hello-${{ matrix.arch }}
          path: hello.exe
          if-no-files-found: ignore

  # ── Release job ─────────────────────────────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: build
    # Only run when every matrix build job succeeded.
    if: ${{ success() }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize binaries into Windows-style architecture subfolders
        run: |
          for ARCH in x86 x64 ARM ARM64; do
            mkdir -p "release/$ARCH"
            cp "artifacts/hello-$ARCH/hello.exe" "release/$ARCH/hello.exe"
          done

      - name: Determine release version (YYYYMMDD.XX)
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y%m%d)
          # Count releases whose tag starts with today's date (any suffix).
          COUNT=$(gh api repos/${{ github.repository }}/releases \
            --paginate --jq '.[].tag_name' \
            | grep -c "^${DATE}" || true)
          echo "version=${DATE}.$((COUNT + 1))" >> "$GITHUB_OUTPUT"

      - name: Create release ZIP
        run: |
          cd release
          zip -r "../BootstrapPlayground-${{ steps.version.outputs.version }}.zip" .

      - name: Upload release ZIP as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.version.outputs.version }}
          path: BootstrapPlayground-${{ steps.version.outputs.version }}.zip

      - name: Create GitHub Release and tag commit
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "$VERSION" \
            --title "Release $VERSION" \
            --notes "Automated release $VERSION" \
            "BootstrapPlayground-${VERSION}.zip"
